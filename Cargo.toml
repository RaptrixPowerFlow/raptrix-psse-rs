[package]
name = "raptrix-psse-rs"
version = "0.1.0"
edition = "2021"
rust-version = "1.70"
authors = ["Musto Technologies LLC <dev@mustotechnologies.com>"]
license = "MPL-2.0"
description = "High-performance PSS/E (.raw + .dyr) → Raptrix PowerFlow Interchange v0.6.0 converter"
repository = "https://github.com/MustoTechnologies/raptrix-psse-rs"
keywords = ["psse", "power-systems", "converter", "raptrix", "cim"]
categories = ["command-line-utilities", "parser-implementations"]

# NOTE: During development, raptrix-cim-arrow is resolved from the local stub.
# Once the sibling workspace is available, change the path to:
#
#   raptrix-cim-arrow = { path = "../raptrix-cim-rs/raptrix-cim-arrow" }
#
[dependencies]
clap = { version = "4", features = ["derive"] }
raptrix-cim-arrow = { path = "raptrix-cim-arrow" }

[dev-dependencies]
# Golden-file tests use std::fs; no additional crates required for the scaffold.
