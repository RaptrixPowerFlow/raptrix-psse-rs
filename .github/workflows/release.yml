# Triggered by pushing a version tag, e.g.:
#   git tag v0.2.0 && git push origin v0.2.0
#
# Builds release binaries for Windows, Linux, and macOS and attaches them to
# the GitHub Release that is created automatically for the tag.

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write   # needed to create the GitHub Release and upload assets

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: raptrix-psse-rs-windows-x86_64.zip
            binary: raptrix-psse-rs.exe

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: raptrix-psse-rs-linux-x86_64.tar.gz
            binary: raptrix-psse-rs

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: raptrix-psse-rs-macos-aarch64.tar.gz
            binary: raptrix-psse-rs

    steps:
      - uses: actions/checkout@v4

      - name: Clone sibling raptrix-cim-rs
        uses: actions/checkout@v4
        with:
          repository: MustoTechnologies/raptrix-cim-rs
          path: ../raptrix-cim-rs

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      # ---- Package --------------------------------------------------------

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "target\${{ matrix.target }}\release\${{ matrix.binary }}"
          Compress-Archive -Path $bin -DestinationPath ${{ matrix.artifact }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          tar -czf ${{ matrix.artifact }} \
            -C target/${{ matrix.target }}/release ${{ matrix.binary }}

      # ---- Upload ---------------------------------------------------------

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
